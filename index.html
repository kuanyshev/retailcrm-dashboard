<!DOCTYPE html>
<html>
<head>
    <title>Дашборд заказов Nova</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-card .number { font-size: 32px; font-weight: bold; }
        canvas { max-height: 400px; margin: 20px 0; }
        button { padding: 8px 15px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .error { color: red; padding: 10px; background: #ffeeee; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Дашборд заказов Nova</h1>
        
        <div class="stats">
            <div class="stat-card"><h3>Всего заказов</h3><div class="number" id="totalOrders">0</div></div>
            <div class="stat-card"><h3>Общая выручка</h3><div class="number" id="totalRevenue">0 ₸</div></div>
            <div class="stat-card"><h3>Средний чек</h3><div class="number" id="avgOrderValue">0 ₸</div></div>
        </div>
        
        <div>
            <label>Фильтр: </label>
            <select id="cityFilter">
                <option value="all">Все города</option>
                <option value="Алматы">Алматы</option>
                <option value="Астана">Астана</option>
            </select>
            <button onclick="loadData()">Применить</button>
        </div>
        
        <canvas id="ordersChart"></canvas>
        <div id="recentOrders"></div>
    </div>

    <script>
        // ===== КОНФИГУРАЦИЯ =====
        const SUPABASE_URL = 'https://fzhindouhwrbrlnpbbbi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6aGluZG91aHdyYnJsbnBiYmJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjMxMjksImV4cCI6MjA5MTk5OTEyOX0.9HiwDM8mriOcMQYz0l31gL6zhsTLQe_1fo7A7aJVQtk';
        
        // СОЗДАЁМ КЛИЕНТ (ТОЛЬКО ОДИН РАЗ!)
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let chart = null;
        
        async function loadData() {
            const cityFilter = document.getElementById('cityFilter').value;
            
            let query = supabase.from('orders').select('*');
            if (cityFilter !== 'all') query = query.eq('city', cityFilter);
            
            const { data, error } = await query;
            
            if (error) {
                document.getElementById('recentOrders').innerHTML = `<div class="error">Ошибка: ${error.message}</div>`;
                return;
            }
            
            if (!data || data.length === 0) {
                document.getElementById('recentOrders').innerHTML = '<div class="error">Нет данных</div>';
                return;
            }
            
            // Статистика
            const totalOrders = data.length;
            const totalRevenue = data.reduce((sum, order) => sum + (order.total_sum || 0), 0);
            document.getElementById('totalOrders').innerText = totalOrders;
            document.getElementById('totalRevenue').innerText = totalRevenue.toLocaleString() + ' ₸';
            document.getElementById('avgOrderValue').innerText = Math.round(totalRevenue/totalOrders).toLocaleString() + ' ₸';
            
            // График
            const byDate = {};
            data.forEach(order => {
                const date = order.created_at ? new Date(order.created_at).toLocaleDateString() : 'Без даты';
                byDate[date] = (byDate[date] || 0) + (order.total_sum || 0);
            });
            
            if (chart) chart.destroy();
            chart = new Chart(document.getElementById('ordersChart'), {
                type: 'line',
                data: {
                    labels: Object.keys(byDate).sort(),
                    datasets: [{ label: 'Выручка (₸)', data: Object.values(byDate), borderColor: 'rgb(75, 192, 192)' }]
                }
            });
            
            // Последние заказы
            document.getElementById('recentOrders').innerHTML = data.slice(-5).reverse().map(order => `
                <div style="border:1px solid #ddd; margin:10px 0; padding:10px">
                    <strong>${order.first_name || '?'} ${order.last_name || '?'}</strong><br>
                    📍 ${order.city || '?'} | 💰 ${(order.total_sum || 0).toLocaleString()} ₸
                </div>
            `).join('');
        }
        
        loadData();
    </script>
</body>
</html>
